<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composition Expert - Akvarellskiss</title>
    
    <!-- Bibliotek för beskärning -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        :root {
            /* Färgmatchning från din bild */
            --bg-color: #fdfaf3; 
            --card-bg: #ffffff;
            --accent-color: #d4a373;
            --text-color: #4a4a4a;
            --button-hover: #bc8a5f;
            --border-radius: 24px;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            background: var(--card-bg);
            max-width: 800px;
            width: 100%;
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        header h1 { margin-bottom: 5px; font-size: 1.8rem; }
        header p { color: #888; margin-top: 0; font-size: 0.9rem; }

        .upload-section { margin: 20px 0; }

        /* Snyggare uppladdningsknapp */
        .btn-primary {
            background: var(--accent-color);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            display: inline-block;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-primary:hover { background: var(--button-hover); }

        .editor-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 15px;
        }

        /* Om skärmen är bred (dator) */
        @media (min-width: 650px) {
            .editor-layout { flex-direction: row; align-items: flex-start; }
        }

        .canvas-area {
            flex: 2;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            min-height: 300px;
            position: relative;
        }

        #imageToEdit { max-width: 100%; display: block; }

        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            background: #f9f7f2;
            padding: 15px;
            border-radius: 18px;
            text-align: left;
        }

        .control-group h3 { font-size: 0.9rem; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }

        select {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-toggle, .btn-success {
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }

        .btn-toggle { background: #eee; color: #666; }
        .btn-toggle.active { background: #4a4a4a; color: white; }

        .btn-success {
            background: #8fa18d; /* Dov grön */
            color: white;
            width: 100%;
            margin-top: 10px;
            font-size: 1rem;
        }

        /* Posterize filter effekt */
        .posterize { filter: contrast(180%) saturate(140%) brightness(110%); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Composition Expert</h1>
        <p>Find the perfect crop for your next watercolor</p>
    </header>

    <div class="upload-section">
        <input type="file" id="imageInput" accept="image/*" hidden>
        <label for="imageInput" class="btn-primary">Choose Photo</label>
    </div>

    <div class="editor-layout" id="mainLayout" style="display:none;">
        <div class="canvas-area">
            <img id="imageToEdit">
        </div>

        <aside class="controls">
            <section class="control-group">
                <h3>Paper Ratio</h3>
                <select id="aspectRatio">
                    <option value="NaN">Free Crop</option>
                    <option value="1">Square (1:1)</option>
                    <option value="0.707">A4 / Portrait</option>
                    <option value="1.414">A4 / Landscape</option>
                    <option value="0.66">Classic (2:3)</option>
                    <option value="1.5">Classic (3:2)</option>
                </select>
            </section>

            <section class="control-group">
                <h3>Visual Aids</h3>
                <div class="btn-grid">
                    <button class="btn-toggle" id="btnGrayscale">Values (B&W)</button>
                    <button class="btn-toggle" id="btnMirror">Mirror</button>
                    <button class="btn-toggle" id="btnSimplify">Simplify</button>
                </div>
            </section>

            <button id="downloadBtn" class="btn-success">Download Export</button>
        </aside>
    </div>
</div>

<script>
    let cropper;
    const imageInput = document.getElementById('imageInput');
    const image = document.getElementById('imageToEdit');
    const mainLayout = document.getElementById('mainLayout');
    const aspectRatioSelect = document.getElementById('aspectRatio');

    // Ladda bilden
    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            image.src = event.target.result;
            mainLayout.style.display = 'flex'; // Visa editorn
            
            if (cropper) cropper.destroy();

            cropper = new Cropper(image, {
                viewMode: 1,
                dragMode: 'move',
                autoCropArea: 0.9,
                guides: true, // Rules of thirds
                center: true,
                highlight: false,
                background: false
            });
        };
        reader.readAsDataURL(file);
    });

    // Proportioner
    aspectRatioSelect.addEventListener('change', (e) => {
        if (!cropper) return;
        cropper.setAspectRatio(parseFloat(e.target.value));
    });

    // Gråskala (Value Study)
    document.getElementById('btnGrayscale').addEventListener('click', function() {
        this.classList.toggle('active');
        const container = document.querySelector('.cropper-container');
        if(this.classList.contains('active')) {
            container.style.filter = 'grayscale(100%)';
        } else {
            container.style.filter = 'none';
        }
    });

    // Spegelvända
    document.getElementById('btnMirror').addEventListener('click', function() {
        if (!cropper) return;
        const data = cropper.getData();
        cropper.scaleX(data.scaleX === 1 ? -1 : 1);
    });

    // Simplify (Posterize simulering)
    document.getElementById('btnSimplify').addEventListener('click', function() {
        this.classList.toggle('active');
        const container = document.querySelector('.cropper-container');
        if(this.classList.contains('active')) {
            container.classList.add('posterize');
        } else {
            container.classList.remove('posterize');
        }
    });

    // Ladda ner
    document.getElementById('downloadBtn').addEventListener('click', () => {
        if (!cropper) return;
        const canvas = cropper.getCroppedCanvas();
        const link = document.createElement('a');
        link.download = 'art-composition.png';
        link.href = canvas.toDataURL();
        link.click();
    });
</script>

</body>
</html>
